<!-- Tagline -->
<text x="600" y="200"
  font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
  font-size="14" text-anchor="middle" fill="#94a3b8" letter-spacing="0.5"
