name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill frontmatter & structure
        run: python3 scripts/validate_skills.py

      - name: Check catalog is in sync
        run: python3 scripts/generate_catalog.py --check

      - name: Check internal links
        run: python3 scripts/check_links.py
